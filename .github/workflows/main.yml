name: Build Grok Mac App

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller Pillow

      - name: Build with PyInstaller
        run: |
          # Собираем программу
          pyinstaller --noconfirm --onefile --windowed --add-data "grok.ico:." GrokPromptManager.py
          # Сразу упаковываем в ZIP внутри сервера (как в Банане)
          cd dist
          zip -r GrokPromptManager_MacOS.zip GrokPromptManager.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grok-MacOS-Final
          path: dist/GrokPromptManager_MacOS.zip
